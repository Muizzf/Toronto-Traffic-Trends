<!DOCTYPE html>
<html>
<head>
  <title>Traffic Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>🚗 Toronto Traffic Analytics Dashboard</h1>
</header>

<div class="cards">
  <div class="card" id="accidentsCard">Loading...</div>
  <div class="card" id="fatalitiesCard">Loading...</div>
  <div class="card" id="peakHourCard">Loading...</div>
  <div class="card" id="injuryRateCard">Loading...</div>
  <div class="card" id="dailyAccidentsCard">Loading...</div>
</div>

<div class="dashboard">
  <canvas id="hourChart"></canvas>
  <canvas id="dayChart"></canvas>
  <canvas id="fatalChart" class="full-width"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
